version: "3.8"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://pulsenotify:password@db:5432/pulsenotifydb
      - APP_ENV=development
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: pulsenotify
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pulsenotifydb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulsenotify"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:/var/lib/postgresql/data